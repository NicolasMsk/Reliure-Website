<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | Book of Silk — reliure d'art</title>
  <meta name="description" content="Contactez l'atelier Book of Silk pour un projet de reliure, une restauration de bible ou une création brodée sur-mesure." />
  <meta name="theme-color" content="#5c0f24" />
  <link rel="icon" href="/favicon.svg?v=16" type="image/svg+xml" />
  <link rel="canonical" href="https://reliure-website-production.up.railway.app/contact" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Book of Silk" />
  <meta property="og:locale" content="fr_FR" />
  <meta property="og:title" content="Contact | Book of Silk — reliure d'art" />
  <meta property="og:description" content="Contactez l'atelier Book of Silk pour un projet de reliure, une restauration de bible ou une création brodée sur-mesure." />
  <meta property="og:url" content="https://reliure-website-production.up.railway.app/contact" />
  <meta property="og:image" content="https://reliure-website-production.up.railway.app/images/hero.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="stylesheet" href="/css/style.css?v=16" />
</head>
<body>
  <header class="site-header" id="site-header"></header>
  <main>
    <section class="section">
      <div class="container" style="max-width: 620px;">
        <h1 class="center" data-i18n="contact.title"></h1>
        <div class="rule"></div>
        <p class="center" data-i18n="contact.intro"></p>
        <form id="contact-form">
          <label class="field">
            <span data-i18n="contact.name"></span>
            <input type="text" name="name" required />
          </label>
          <label class="field">
            <span data-i18n="contact.email"></span>
            <input type="email" name="email" required />
          </label>
          <label class="field">
            <span data-i18n="contact.message"></span>
            <textarea name="message" required></textarea>
          </label>
          <button class="btn" type="submit" data-i18n="contact.send"></button>
          <p class="form-note" id="contact-note" hidden></p>
        </form>
      </div>
    </section>
  </main>
  <footer class="site-footer" id="site-footer"></footer>
  <script src="/js/i18n.js?v=16"></script>
  <script src="/js/layout.js?v=16"></script>
  <script src="/js/contact.js?v=16"></script>
</body>
</html>
