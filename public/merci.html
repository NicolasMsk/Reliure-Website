<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reliure — Merci</title>
  <link rel="stylesheet" href="/css/style.css?v=2" />
  <style>
    /* Page Merci : moment de confirmation, sobre et cérémoniel — palette existante. */
    .merci-seal {
      width: 88px; height: 88px; margin: 0 auto 1.25rem; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      background: radial-gradient(circle at 35% 30%, var(--burgundy) 0%, var(--burgundy-deep) 70%);
      color: var(--gold); font-family: var(--font-display); font-size: 2.6rem; line-height: 1;
      box-shadow: var(--shadow-soft), inset 0 0 0 1px rgba(210, 191, 129, 0.45);
    }
    .merci-back { margin-top: 2rem; }
  </style>
</head>
<body>
  <header class="site-header" id="site-header"></header>
  <main>
    <section class="section center">
      <div class="container" style="max-width:640px">
        <div class="merci-seal" aria-hidden="true">✦</div>
        <h1 data-i18n="merci.title"></h1>
        <div class="rule"></div>
        <p id="merci-msg" data-i18n="merci.pending"></p>
        <p class="merci-back"><a class="btn" href="/boutique" data-i18n="merci.back"></a></p>
      </div>
    </section>
  </main>
  <footer class="site-footer" id="site-footer"></footer>
  <script src="/js/i18n.js"></script>
  <script src="/js/layout.js"></script>
  <script src="/js/merci.js"></script>
</body>
</html>
